spring.application.name=backend-impressoes

# ===============================
# CONFIGURAÇÃO DO POSTGRESQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/sistema_impressoes
spring.datasource.username=postgres
spring.datasource.password=527463
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURAÇÃO DO JPA / HIBERNATE
# ===============================
# Mostra no terminal os comandos SQL que o Java está fazendo
spring.jpa.show-sql=true

# Formata o SQL no terminal para ficar legível
spring.jpa.properties.hibernate.format_sql=true

# Atualiza as tabelas automaticamente baseado no seu código Java
spring.jpa.hibernate.ddl-auto=update